<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot – Plánování Kuchyní</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .chatbot-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #fff;
            border: none;
            display: flex;
            flex-direction: column;
        }

        .chatbot-header {
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }

        .chatbot-body {
            padding: 10px;
            height: calc(100% - 150px); /* Dynamicky nastav výšku podle headeru a footeru */
            overflow-y: auto;
            background-color: #f9f9f9;
            flex-grow: 1;
        }

        .chatbot-input {
            padding: 20px;
            border-top: 1px solid #ddd;
            display: flex;
            align-items: center;
        }

        .chatbot-input input {
            flex: 1;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-right: 10px;
        }

        .chatbot-input button {
            padding: 15px 20px;
            background-color: #333;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<!-- Chatbot Container přes celou stránku -->
<div class="chatbot-container" id="chatbot">
    <div class="chatbot-header">
        <h3>Chatbot pro Plánování Kuchyní</h3>
    </div>
    <div class="chatbot-body" id="chatbotBody">
        <p>Vítejte! Jak vám mohu pomoci s plánováním kuchyně?</p>
    </div>
    <div class="chatbot-input">
        <input type="text" id="userInput" placeholder="Napište zprávu...">
        <button onclick="sendMessage()">Odeslat</button>
    </div>
</div>

<script>
    function sendMessage() {
        var userInput = document.getElementById("userInput").value;
        var chatbotBody = document.getElementById("chatbotBody");

        if (userInput.trim() !== "") {
            // Zobrazí uživatelskou zprávu v okně chatu
            var userMessage = document.createElement("p");
            userMessage.textContent = "Vy: " + userInput;
            userMessage.style.color = "blue"; // Změna barvy uživatelské zprávy
            chatbotBody.appendChild(userMessage);

            // Simulovaná odpověď od bota
            var botMessage = document.createElement("p");
            botMessage.textContent = "Bot: Zatím nemám odpověď, ale brzy se to naučím!";
            botMessage.style.color = "green"; // Změna barvy zprávy od bota
            chatbotBody.appendChild(botMessage);

            // Vymaže vstupní pole a posune chat dolů
            document.getElementById("userInput").value = "";
            chatbotBody.scrollTop = chatbotBody.scrollHeight;
        }
    }
</script>

</body>
</html>
